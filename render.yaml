services:
  - type: web
    name: muhendis-portal-backend
    env: python
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT

  - type: web
    name: muhendis-portal-frontend
    env: static
    plan: free
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: frontend/dist
    env:
      VITE_API_BASE: https://muhendis-portal-backend.onrender.com
